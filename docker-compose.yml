services:
  web:
    build: ./web
    environment:
      DOWNLOADER_URL: http://downloader:8080
      DOWNLOAD_DIR: /downloads
      COOKIES_DIR: /cookies
      CERTS_DIR: /certs
      DB_PATH: /data/app.db
      PORT: "3000"
      # Node's happy-eyeballs autoFamily misbehaves when the netns has no
      # IPv6 route (tailscale-sidecar mode): every AAAA address returns
      # ENETUNREACH almost instantly and the IPv4 fallback gets tagged as
      # ETIMEDOUT, so all outbound fetch() calls (e.g. megajs → MEGA API)
      # fail at ~1.5s even though curl works. Force IPv4-first and disable
      # the autoselection so node:https / undici behave like curl.
      NODE_OPTIONS: "--no-network-family-autoselection --dns-result-order=ipv4first"
    volumes:
      - ${HOST_DOWNLOAD_DIR:-./downloads}:/downloads
      - ${HOST_COOKIES_DIR:-./cookies}:/cookies
      - ${HOST_CERTS_DIR:-./certs}:/certs
      - ${HOST_DATA_DIR:-./data}:/data
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - downloader
    restart: unless-stopped

  downloader:
    build: ./downloader
    environment:
      DOWNLOADER_MAX_PARALLEL: "${DOWNLOADER_MAX_PARALLEL:-2}"
      DOWNLOAD_DIR: /downloads
      COOKIES_DIR: /cookies
      CERTS_DIR: /certs
      PORT: "8080"
    volumes:
      - ${HOST_DOWNLOAD_DIR:-./downloads}:/downloads
      - ${HOST_COOKIES_DIR:-./cookies}:/cookies:ro
      - ${HOST_CERTS_DIR:-./certs}:/certs:ro
    restart: unless-stopped
